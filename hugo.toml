baseURL = "https://joaquim.tech"
languageCode = "en-us"
title = "Blog"
theme="archie"
copyright = "© J Bandeira"
[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true

[pagination]
  pagerSize = 5 # articles per page

[params]
	mode="dark" # color-mode → light,dark,toggle or auto
	useCDN=true # don't use CDNs for fonts and icons, instead serve them locally.
	subtitle = "My personal writeups, ramblings and general life posts :)"
	mathjax = true # enable MathJax support
	katex = true # enable KaTeX support

# Social Tags

[[params.social]]
name = "GitHub"
icon = "github"
url = "https://github.com/joaquimbc/"

# Main menu Items

[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "All posts"
url = "/posts"
weight = 2

